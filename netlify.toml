# Netlify configuration for Balkan Food House (Vite + React)

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Single-page app: serve index.html for any path.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache the hashed build assets.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
